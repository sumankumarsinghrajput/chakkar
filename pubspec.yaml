name: chakkar
description: "The Ultimate Brain Battle"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_database: ^11.3.4
  google_sign_in: ^6.2.2
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^14.8.1
  cupertino_icons: ^1.0.8
  share_plus: ^10.0.0
  screenshot: ^3.0.0
  path_provider: ^2.1.2
  audioplayers: ^6.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
  assets:
    - assets/images/
    - assets/fonts/
    - assets/audio/correct/
    - assets/audio/wrong/
    - assets/audio/win/
    - assets/audio/lose/
    - assets/audio/ui/
    - assets/audio/countdown/
    - assets/audio/multiplayer/
    - assets/audio/slaps/
    - assets/audio/reactions/